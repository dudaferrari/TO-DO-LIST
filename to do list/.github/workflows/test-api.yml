name: Test API

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install API dependencies
        run: |
          cd "to do list/packages/api"
          npm install --no-audit --no-fund

      - name: Run API tests
        run: |
          cd "to do list/packages/api"
          npm test
